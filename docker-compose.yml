services:
  postgres:
    image: postgres:16-alpine
    container_name: nexusrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexusrm
      POSTGRES_PASSWORD: nexusrm
      POSTGRES_DB: nexusrm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusrm -d nexusrm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: nexusrm-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://nexusrm:nexusrm@postgres:5432/nexusrm?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000
    container_name: nexusrm-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
